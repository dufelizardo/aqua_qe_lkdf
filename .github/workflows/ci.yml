name: AQuA-QE LKDF — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check runtime-core/ ai_engine/ shared/ tests/
      - name: Mypy type check
        run: mypy runtime-core/ ai_engine/ shared/
        continue-on-error: true   # Phase 1: warnings only

  # ─── Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=runtime-core --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit

  # ─── Integration Tests ───────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─── Acceptance Test (Fase 1 Criteria) ───────────────────────────────────
  acceptance:
    name: "Fase 1 — Acceptance Criteria"
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: "Criterio: DSL Parser valid"
        run: python -c "
from runtime_core.parser.dsl_parser import DSLParser, validate_dsl
dsl = open('tests/fixtures/login_flow.lkdf').read() if __import__('os').path.exists('tests/fixtures/login_flow.lkdf') else '''
@flow LoginFlow
  @scenario ValidLogin
    Dado que o usuário está na página de login
    Quando o usuário clica no botão \"Entrar\"
    Então é esperado que a mensagem \"Bem-vindo\" seja exibida
'''
result = validate_dsl(dsl)
assert result.valid, f'DSL inválido: {result.errors}'
flow = DSLParser().parse(dsl)
assert len(flow.scenarios) > 0
print('PASS: DSL Parser OK')
"
      - name: "Criterio: Intent Resolver enriches steps"
        run: python -c "
from runtime_core.parser.dsl_parser import DSLParser
from runtime_core.semantic_engine.intent_resolver import IntentResolver
dsl = '''
@flow TestFlow
  @scenario Test
    Dado que o usuário está na página de login
    Quando o usuário clica no botão \"Entrar\"
    Então é esperado que a mensagem \"Sucesso\" seja exibida
'''
flow = DSLParser().parse(dsl)
resolver = IntentResolver()
for s in flow.scenarios:
    for step in s.steps:
        enriched = resolver.enrich_step(step)
        assert enriched.intent, f'Step sem intent: {step.text}'
        assert enriched.action, f'Step sem action: {step.text}'
print('PASS: Intent Resolver OK')
"

  # ─── Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: acceptance
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Runtime Core image
        run: docker build -f infrastructure/Dockerfile.runtime -t lkdf-runtime:${{ github.sha }} .
      - name: Test health endpoint
        run: |
          docker run -d -p 8080:8080 --name lkdf-test lkdf-runtime:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health
          docker stop lkdf-test
