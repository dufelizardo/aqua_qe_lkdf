name: AQuA-QE LKDF — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Ensure runtime_core exists
        run: |
          # runtime-core/ uses a hyphen which is invalid as a Python package name.
          # If only runtime-core/ exists, create runtime_core/ as a copy.
          if [ ! -d "runtime_core" ]; then
            cp -r runtime-core runtime_core
          fi

      - name: Ruff lint
        run: ruff check runtime_core/ ai_engine/ shared/ tests/

      - name: Mypy type check
        run: mypy -p runtime_core -p ai_engine -p shared --ignore-missing-imports
        continue-on-error: true

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Ensure runtime_core exists
        run: |
          if [ ! -d "runtime_core" ]; then
            cp -r runtime-core runtime_core
          fi

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=runtime_core \
            --cov=ai_engine \
            --cov=shared \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit

  # ── Integration Tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Ensure runtime_core exists
        run: |
          if [ ! -d "runtime_core" ]; then
            cp -r runtime-core runtime_core
          fi

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Acceptance ─────────────────────────────────────────────────────────────
  acceptance:
    name: MVP Acceptance Criteria
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Ensure runtime_core exists
        run: |
          if [ ! -d "runtime_core" ]; then
            cp -r runtime-core runtime_core
          fi

      - name: DSL Parser
        run: python tests/acceptance/test_dsl_parser.py

      - name: Intent Resolver
        run: python tests/acceptance/test_intent_resolver.py

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: acceptance
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build Runtime Core image
        run: docker build -f infrastructure/Dockerfile.runtime -t lkdf-runtime:${{ github.sha }} .

      - name: Test health endpoint
        run: |
          docker run -d -p 8080:8080 --name lkdf-test lkdf-runtime:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health
          docker stop lkdf-test
